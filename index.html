<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Family Album</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ============================================================
     HEADER
     ============================================================ -->
<header id="app-header">
  <h1>Our Family Album <small>Photos &amp; Memories</small></h1>
  <nav>
    <button data-view="gallery" class="active">Gallery</button>
    <button data-view="slideshow">Slideshow</button>
  </nav>
  <div id="user-info">
    <span id="user-name-display"></span>
    <button id="change-user">Change</button>
  </div>
</header>

<!-- ============================================================
     GALLERY VIEW
     ============================================================ -->
<main id="gallery-view" class="view active">
  <div id="gallery-toolbar">
    <input type="search" id="search-input" placeholder="Search photos, people, places...">
    <div id="people-filter"></div>
    <span id="gallery-stats"></span>
  </div>
  <div id="gallery-grid"></div>
</main>

<!-- ============================================================
     DETAIL VIEW
     ============================================================ -->
<main id="detail-view" class="view">
  <div id="detail-container">
    <div id="detail-photo-area">
      <button class="nav-btn" id="detail-prev">&#8249;</button>
      <img id="detail-photo" src="" alt="">
      <button class="nav-btn" id="detail-next">&#8250;</button>
    </div>
    <aside id="detail-sidebar">
      <!-- AI Annotation -->
      <div class="sidebar-section" id="annotation-section">
        <h3>About this photo <span class="badge" id="annotation-status"></span></h3>
        <div id="ai-annotation-content"></div>
        <div class="annotation-actions" id="annotation-actions">
          <button class="btn-confirm" id="btn-confirm">&#10003; Correct</button>
          <button id="btn-edit">&#9998; Edit</button>
        </div>
      </div>
      <!-- People -->
      <div class="sidebar-section" id="people-section">
        <h3>People in this photo</h3>
        <div id="people-tags"></div>
        <div id="add-person-form">
          <input type="text" id="person-input" placeholder="Add person..." autocomplete="off">
          <button class="btn-add-person" id="btn-add-person">+</button>
        </div>
        <div id="person-suggestions"></div>
      </div>
      <!-- Anecdotes -->
      <div class="sidebar-section" id="anecdotes-section">
        <h3>Stories &amp; Memories</h3>
        <div id="anecdotes-list"></div>
        <textarea id="anecdote-input" placeholder="Share a memory about this photo..."></textarea>
        <button class="btn-add-anecdote" id="btn-add-anecdote">Share</button>
      </div>
    </aside>
  </div>
</main>

<!-- ============================================================
     SLIDESHOW VIEW
     ============================================================ -->
<main id="slideshow-view" class="view">
  <div class="slide" id="slide-a"></div>
  <div class="slide" id="slide-b"></div>
  <div id="slideshow-annotation-overlay"></div>
  <div id="frame-overlay"><img src="frame.png" alt=""></div>
  <div id="counter"></div>
  <div id="pause-indicator">&#10074;&#10074; PAUSED</div>
  <button id="slideshow-exit">&#10005;</button>
</main>

<!-- ============================================================
     USER NAME MODAL
     ============================================================ -->
<div id="user-modal" class="modal">
  <div class="modal-content">
    <h2>Welcome to the Family Album</h2>
    <p>What's your name? So we know who's adding stories.</p>
    <input type="text" id="user-name-input" placeholder="Your name...">
    <button id="user-name-submit">Enter Album</button>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
