name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-pages:
    name: Deploy static site to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=family-album --branch=main

  deploy-worker:
    name: Deploy Cloudflare Worker API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      # Apply D1 schema before deploying the worker so the new code
      # never goes live against a stale database. Safe to re-run on
      # every deploy: schema.sql uses CREATE TABLE / INDEX IF NOT
      # EXISTS throughout. NOTE: this does NOT handle destructive
      # changes (renames, column drops, data backfills) — those need
      # a real migration system. See the tracking issue for switching
      # to `wrangler d1 migrations`.
      - name: Apply D1 schema
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: d1 execute family-album --remote --file=schema.sql

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy
