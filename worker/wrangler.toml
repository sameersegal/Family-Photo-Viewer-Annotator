name = "family-album-api"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
account_id = "6404a2d4d7c4c758d8eaf0c6fc972241"

[[d1_databases]]
binding = "DB"
database_name = "family-album"
database_id = "5b5b4e86-dfb8-4b1a-b0d2-c2229fa58710"

# ------------------------------------------------------------
# Cloudflare Access (Email OTP) — authentication config
# ------------------------------------------------------------
# ACCESS_TEAM_DOMAIN and ACCESS_AUD are NOT kept in this file because
# the repo is public. They are stored as encrypted Wrangler secrets in
# Cloudflare's infrastructure. Set them once with:
#
#   cd worker
#   npx wrangler secret put ACCESS_TEAM_DOMAIN   # e.g. kkalyanpurs.cloudflareaccess.com
#   npx wrangler secret put ACCESS_AUD           # AUD Tag from Zero Trust dashboard
#
# Secrets persist across deploys, so CI doesn't need to know about them.
#
# ALLOWED_ORIGINS is just a CORS allow-list of public URLs — not
# sensitive, so it stays in the repo for clarity.
[vars]
ALLOWED_ORIGINS = "https://family-album-a2m.pages.dev,http://localhost:8765"

# ------------------------------------------------------------
# Local dev only — uncomment in a [env.dev] block if you need to run
# `wrangler dev` without Cloudflare Access in front. Never set these
# for production.
# ------------------------------------------------------------
# [env.dev.vars]
# AUTH_DEV_BYPASS = "true"
# AUTH_DEV_EMAIL  = "you@example.com"
